<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Swift Kasir</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Swift Kasir" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS Icons (Apple Touch Icons) -->
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png" />

    <!-- Theme color -->
    <meta name="theme-color" content="#3b82f6" />
    <meta name="description" content="Aplikasi kasir offline yang cepat dan mudah digunakan" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <!-- Disable Pinch-to-Zoom (Native APK behavior) -->
    <style>
      html {
        touch-action: pan-x pan-y;
        overflow: hidden;
      }
      body {
        touch-action: pan-x pan-y;
        -ms-touch-action: pan-x pan-y;
        overflow: hidden;
      }
      /* Semua elemen: larang pinch gesture */
      * {
        -webkit-tap-highlight-color: transparent;
        touch-action: pan-x pan-y;
      }
      /* Elemen scrollable boleh scroll vertikal saja */
      .page-container, .cart-sheet, .pos-products, .pos-sidebar,
      [style*="overflow"], [class*="scroll"] {
        touch-action: pan-y;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Register Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/sw.js')
            .then((reg) => console.log('SW registered:', reg.scope))
            .catch((err) => console.log('SW error:', err));
        });
      }

      // ============================================================
      // ANTI PINCH-TO-ZOOM — Chrome Android ignores user-scalable=no
      // ============================================================

      // 1. Safari iOS: gesture events
      document.addEventListener('gesturestart',  function(e){ e.preventDefault(); }, { passive: false, capture: true });
      document.addEventListener('gesturechange', function(e){ e.preventDefault(); }, { passive: false, capture: true });
      document.addEventListener('gestureend',    function(e){ e.preventDefault(); }, { passive: false, capture: true });

      // 2. Semua browser: blokir touchmove 2+ jari di capture phase
      //    (capture: true agar tidak bisa di-cancel oleh React)
      window.addEventListener('touchmove', function(e) {
        if (e.touches.length > 1) {
          e.preventDefault();
        }
      }, { passive: false, capture: true });

      // 3. Blokir touchstart 2+ jari juga
      window.addEventListener('touchstart', function(e) {
        if (e.touches.length > 1) {
          e.preventDefault();
        }
      }, { passive: false, capture: true });

      // 4. Prevent double-tap zoom
      var lastTouchEnd = 0;
      document.addEventListener('touchend', function(e) {
        var now = Date.now();
        if (now - lastTouchEnd <= 300) {
          e.preventDefault();
        }
        lastTouchEnd = now;
      }, { passive: false, capture: true });

      // 5. Blokir Ctrl+Wheel (zoom di desktop/PWA window)
      window.addEventListener('wheel', function(e) {
        if (e.ctrlKey) {
          e.preventDefault();
        }
      }, { passive: false, capture: true });

      // 6. Visual Viewport API — paksa reset scale jika terlanjur zoom
      //    Chrome kadang masih lolos, ini jaring pengaman terakhir
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', function() {
          var scale = window.visualViewport.scale;
          if (scale !== 1) {
            // Reset meta viewport untuk paksa scale = 1
            var mv = document.querySelector('meta[name="viewport"]');
            if (mv) {
              mv.content = 'width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover';
            }
          }
        });
      }
    </script>
  </body>
</html>
