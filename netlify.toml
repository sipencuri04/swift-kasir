[build]
  command = "npm run build"
  publish = "dist"

[dev]
  command = "npm run dev"

# Fix WASM MIME type
[[headers]]
  for = "/*.wasm"
  [headers.values]
    Content-Type = "application/wasm"

# Fix JS module MIME type
[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Service worker - no cache
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# SPA redirect - all routes go to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
